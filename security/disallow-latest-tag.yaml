apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
spec:
  validationFailureAction: Enforce   # Enforce = REJECT violators (Audit = just warn)
  background: true
  rules:
    - name: require-image-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
      # Don't enforce on platform/system namespaces (their charts may use untagged images)
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-node-lease
                - kube-public
                - local-path-storage
                - ingress-nginx
                - argocd
                - monitoring
                - kyverno
                - falco
      validate:
        message: "An image tag is required (an untagged image defaults to ':latest')."
        pattern:
          spec:
            containers:
              - image: "*:*"        # image MUST have a tag (name:tag)
    - name: disallow-latest-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-node-lease
                - kube-public
                - local-path-storage
                - ingress-nginx
                - argocd
                - monitoring
                - kyverno
                - falco
      validate:
        message: "Using the ':latest' tag is not allowed. Pin a specific version."
        pattern:
          spec:
            containers:
              - image: "!*:latest"  # image must NOT end in :latest
