apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: podinfo-success-rate
  namespace: default
spec:
  metrics:
    - name: success-rate
      interval: 20s                      # check every 20s
      count: 4                           # run the check 4 times
      successCondition: "result[0] >= 0.95"   # PASS if ≥95% success
      failureLimit: 1                    # 1 fail → abort (rollback)
      provider:
        prometheus:
          address: http://monitoring-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
          query: |
            sum(rate(http_requests_total{namespace="default", status!~"5.."}[1m]))
            /
            sum(rate(http_requests_total{namespace="default"}[1m]))
